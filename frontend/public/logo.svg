<svg width="600" height="600" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="signalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <!-- Back signal -->
  <g transform="translate(35 70) rotate(-15) scale(1.3)">
    <rect
      x="0" y="0"
      width="260" height="160"
      rx="50"
      fill="url(#signalGradient)"
      stroke="#94A3B8"
      stroke-width="2"
      opacity="0.95"
    />
    <circle cx="70" cy="80" r="10" fill="#F8FAFC"/>
    <circle cx="115" cy="80" r="10" fill="#F8FAFC"/>
    <circle cx="160" cy="80" r="10" fill="#F8FAFC"/>
  </g>

  <!-- Front signal -->
  <g transform="translate(170 170) rotate(10) scale(1.3)">
    <rect
      x="0" y="0"
      width="260" height="160"
      rx="50"
      fill="#F8FAFC"
      stroke="#94A3B8"
      stroke-width="2"
    />
    <circle cx="90" cy="80" r="12" fill="#1F2937"/>
    <circle cx="135" cy="80" r="12" fill="#1F2937"/>
  </g>
</svg>