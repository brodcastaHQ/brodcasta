version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: brodcasta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brodcasta
      POSTGRES_USER: brodcasta
      POSTGRES_PASSWORD: brodcasta_password
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - brodcasta-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brodcasta -d brodcasta"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for pub/sub and caching
  redis:
    image: redis:7-alpine
    container_name: brodcasta-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - brodcasta-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Brodcasta Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: brodcasta-backend
    restart: unless-stopped
    environment:
      DB_USER: brodcasta
      DB_PASSWORD: brodcasta_password
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: brodcasta
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      PORT: 7012
      PAYSTACK_SECRET: sk_test_feff1cc71cb990bf38aaa6221e0a9acef07fec32
      SMTP_HOST: "smtp.zoho.com"
      SMTP_PORT: 587
      SMTP_USERNAME: "nexioslabs@zohomail.com"
      SMTP_PASSWORD: "J7NA3PCnBAWr"
      SMTP_USE_TLS: true
      MAIL_FROM: "Brodcasaa <nexioslabs@zohomail.com>"
    ports:
      - "7012:7012"
    volumes:
      - ./server:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - brodcasta-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8041/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Brodcasta Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: brodcasta-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:7012
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - brodcasta-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Adminer – database management UI
  adminer:
    image: adminer:latest
    container_name: brodcasta-adminer
    restart: unless-stopped
    profiles:
      - adminer
    ports:
      - "4040:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB: brodcasta
      ADMINER_DEFAULT_USER: brodcasta
      ADMINER_DEFAULT_PASSWORD: brodcasta_password
    depends_on:
      - postgres
    networks:
      - brodcasta-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  brodcasta-network:
    driver: bridge
